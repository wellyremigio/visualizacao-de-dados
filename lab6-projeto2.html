  <script type="text/javascript">

    dias_chuva_mais_10mm: 11
  }
};

const dadosFiltrados = Object.keys(data)
  .filter((ano) => Number(ano) >= 2016 && Number(ano) <= 2025);

const variacoes = dadosFiltrados.map(ano => {
  const anoAnterior = String(Number(ano) - 1);
  const diferenca = data[ano].total_chuva - data[anoAnterior].total_chuva;
  return Number(diferenca.toFixed(1)); 
});

option = {
  title: {
    text: 'Volume de chuva acumulada por ano (2016 a 2025) - Fazenda Carnaúba - Taperoá - PB'
  },
  tooltip: {
    trigger: 'axis',
    axisPointer: { type: 'shadow' }, 
    formatter: function (params) {
      const ano = params[0].name;
      const valor = params[0].value;
      const sinal = valor > 0 ? '+' : '';
      return `<strong>Variação para ${ano}:</strong><br/>${sinal}${valor} mm em relação ao ano anterior`;
    }
  },
  xAxis: {
    type: 'category',
    data: dadosFiltrados
  },
  yAxis: {
    type: 'value',
    name: 'Variação (mm)',
    splitLine: { show: true } 
  },
  series: [
    {
      name: 'Variação de Chuva',
      type: 'bar', 
      data: variacoes,
      itemStyle: {
        color: function (params) {
          return params.value > 0 ? '#2ecc71' : '#e74c3c';
        }
      }
    }
  ]
};

    if (option && typeof option === 'object') {
      myChart.setOption(option);
    }

    window.addEventListener('resize', myChart.resize);
  </script>
